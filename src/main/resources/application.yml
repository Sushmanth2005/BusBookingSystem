server:
  port: 8080

spring:
  application:
    name: BusEase

  # H2 File-Based Database (data persists across restarts)
  datasource:
    url: jdbc:h2:file:./data/buseasedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# JWT Configuration
jwt:
  secret: dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yQnVzRWFzZUFwcGxpY2F0aW9uSldUMjAyNg==
  expiration: 86400000  # 24 hours in milliseconds

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
