server:
  port: 8080

spring:
  application:
    name: BusEase

  # PostgreSQL Database
  datasource:
    url: jdbc:postgresql://localhost:5432/buseasedb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt:
  secret: dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yQnVzRWFzZUFwcGxpY2F0aW9uSldUMjAyNg==
  expiration: 86400000  # 24 hours in milliseconds

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
