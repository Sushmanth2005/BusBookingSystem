<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusEase Admin Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header>
        <h1>BusEase Admin Portal</h1>
        <div id="auth-controls">
            <button id="btn-show-login">Login</button>
            <button id="btn-show-register">Register</button>
            <button id="btn-logout" class="hidden">Logout</button>
        </div>
    </header>

    <main>
        <!-- Auth Modals -->
        <section id="auth-section">
            <div id="login-form-container" class="form-container">
                <h2>Admin Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
            </div>

            <div id="register-form-container" class="form-container hidden">
                <h2>Admin Registration</h2>
                <form id="register-form">
                    <input type="text" id="register-name" placeholder="Name" required>
                    <input type="email" id="register-email" placeholder="Email" required>
                    <input type="password" id="register-password" placeholder="Password" required>
                    <select id="register-role">
                        <option value="ADMIN">ADMIN</option>
                        <option value="USER">USER</option>
                    </select>
                    <button type="submit">Register</button>
                </form>
            </div>
        </section>

        <!-- Admin Dashboard Section -->
        <section id="dashboard-section" class="hidden">
            <nav class="tabs">
                <button class="tab-btn active" data-target="buses-panel">Buses</button>
                <button class="tab-btn" data-target="routes-panel">Routes</button>
                <button class="tab-btn" data-target="schedules-panel">Schedules</button>
            </nav>

            <div class="panels">
                <!-- Buses Panel -->
                <div id="buses-panel" class="panel active">
                    <h2>Manage Buses</h2>
                    <form id="add-bus-form" class="inline-form">
                        <input type="text" id="bus-name" placeholder="Bus Name" required>
                        <input type="number" id="bus-seats" placeholder="Total Seats (Min 10)" min="10" required>
                        <select id="bus-type">
                            <option value="AC">AC</option>
                            <option value="NON_AC">NON_AC</option>
                        </select>
                        <button type="submit">Add Bus</button>
                    </form>
                    <table id="buses-table">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Seats</th><th>Type</th><th>Actions</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- Routes Panel -->
                <div id="routes-panel" class="panel hidden">
                    <h2>Manage Routes</h2>
                    <form id="add-route-form" class="inline-form">
                        <input type="text" id="route-source" placeholder="Source" required>
                        <input type="text" id="route-destination" placeholder="Destination" required>
                        <input type="number" id="route-distance" placeholder="Distance (km)" step="0.1" required>
                        <button type="submit">Add Route</button>
                    </form>
                    <table id="routes-table">
                        <thead>
                            <tr><th>ID</th><th>Source</th><th>Destination</th><th>Distance</th><th>Actions</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <!-- Schedules Panel -->
                <div id="schedules-panel" class="panel hidden">
                    <h2>Manage Schedules</h2>
                    <form id="add-schedule-form" class="inline-form">
                        <select id="schedule-bus-id" required><option value="">Select Bus</option></select>
                        <select id="schedule-route-id" required><option value="">Select Route</option></select>
                        <input type="datetime-local" id="schedule-departure" required title="Departure">
                        <input type="datetime-local" id="schedule-arrival" required title="Arrival">
                        <input type="number" id="schedule-price" placeholder="Price" step="0.1" required>
                        <button type="submit">Add Schedule</button>
                    </form>
                    <table id="schedules-table">
                        <thead>
                            <tr><th>ID</th><th>Bus</th><th>Route</th><th>Departure</th><th>Arrival</th><th>Price</th><th>Actions</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
